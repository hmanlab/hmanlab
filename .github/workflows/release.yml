name: release

# Triggered when a GitHub Release is *published* (not on draft save and not
# on bare tag pushes). This lets you draft a release with notes first,
# review them, then click "Publish release" to actually fire the build +
# npm publish pipeline. Builds the Rust binary for every supported
# (OS, arch), drops each into the matching `npm/@hmanlab/<plat>-<arch>/bin/`
# directory, then publishes every subpackage and the umbrella to npm.

on:
  release:
    types: [published]
  # Allow a manual rerun from the Actions tab without re-publishing.
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    # softprops/action-gh-release writes assets to the Release that
    # triggered the workflow — needs contents:write on the per-job token.
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            pkg: linux-x64
            cross: true
            binary: hmanlab
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            pkg: linux-arm64
            cross: true
            binary: hmanlab
          - target: x86_64-apple-darwin
            # macos-13 (Intel) runners are scarce and jobs get stuck in
            # the queue. Use macos-14 (Apple Silicon) and cross-compile
            # to x86_64-apple-darwin via `cargo build --target` — Xcode
            # ships both SDKs so this Just Works from arm64 hardware.
            runner: macos-14
            pkg: darwin-x64
            cross: false
            binary: hmanlab
          - target: aarch64-apple-darwin
            runner: macos-14
            pkg: darwin-arm64
            cross: false
            binary: hmanlab
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            pkg: win32-x64
            cross: false
            binary: hmanlab.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable @ 2026-05
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('Cargo.lock') }}

      - name: Install cross (Linux only)
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage binary into npm subpackage
        shell: bash
        run: |
          mkdir -p "npm/@hmanlab/${{ matrix.pkg }}/bin"
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" \
             "npm/@hmanlab/${{ matrix.pkg }}/bin/${{ matrix.binary }}"
          chmod +x "npm/@hmanlab/${{ matrix.pkg }}/bin/${{ matrix.binary }}" || true

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: hmanlab-${{ matrix.pkg }}
          path: npm/@hmanlab/${{ matrix.pkg }}/bin/${{ matrix.binary }}
          if-no-files-found: error

      # When the workflow was fired by a GitHub Release, also attach the
      # binary to that Release so `curl -fsSL .../install.sh | sh` can
      # fetch it via the predictable `releases/latest/download/<asset>`
      # URL. We rename with the platform suffix so each asset is unique.
      - name: Stage release asset
        if: github.event_name == 'release'
        shell: bash
        run: |
          if [[ "${{ matrix.binary }}" == "hmanlab.exe" ]]; then
            cp "target/${{ matrix.target }}/release/hmanlab.exe" "hmanlab-${{ matrix.pkg }}.exe"
          else
            cp "target/${{ matrix.target }}/release/hmanlab" "hmanlab-${{ matrix.pkg }}"
          fi

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: hmanlab-${{ matrix.pkg }}*
          fail_on_unmatched_files: true

  publish:
    name: publish to npm
    needs: build
    runs-on: ubuntu-latest
    # `npm publish --provenance` mints a GitHub OIDC token, which needs
    # write access on the id-token permission. contents:read is the
    # bare minimum to checkout the repo.
    permissions:
      # contents:write — softprops/action-gh-release uploads install.sh
      #   as a Release asset so curl-from-releases/latest works.
      # id-token:write — npm publish --provenance mints a GitHub OIDC token.
      contents: write
      id-token: write
    # Skip publish on workflow_dispatch (manual rebuilds) and on forks
    # that haven't configured NPM_TOKEN — but always run the build matrix.
    if: github.event_name == 'release' && github.repository_owner == 'rekabytes'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      # Upload install.sh as a Release asset so the curl one-liner
      # (`curl … releases/latest/download/install.sh | sh`) works.
      - name: Upload install.sh to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2
        with:
          files: install.sh
          fail_on_unmatched_files: true

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing
        # OIDC trusted publishing requires npm >= 11.5. The npm bundled
        # with setup-node@v4 + node 20 is older, so pin to a known-good
        # version explicitly.
        run: npm install -g npm@latest

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: artifacts

      - name: Stage artifacts into npm tree
        shell: bash
        run: |
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64; do
            mkdir -p "npm/@hmanlab/$pkg/bin"
            cp "artifacts/hmanlab-$pkg/hmanlab" "npm/@hmanlab/$pkg/bin/hmanlab"
            chmod +x "npm/@hmanlab/$pkg/bin/hmanlab"
          done
          mkdir -p "npm/@hmanlab/win32-x64/bin"
          cp "artifacts/hmanlab-win32-x64/hmanlab.exe" "npm/@hmanlab/win32-x64/bin/hmanlab.exe"

      - name: Sanity-check binaries
        shell: bash
        run: |
          ls -la npm/@hmanlab/*/bin/
          file npm/@hmanlab/linux-x64/bin/hmanlab || true

      - name: Publish subpackages
        # No NODE_AUTH_TOKEN: this uses npm OIDC trusted publishing.
        # The `id-token: write` permission above lets npm mint a short-
        # lived token from the GitHub OIDC issuer. The Trusted Publisher
        # entry on npmjs.com (repo + workflow filename) authorises it.
        run: |
          # Idempotent + retry-on-409. npm's packument index is eventually
          # consistent: publishing several packages back-to-back can race
          # and yield 409 "Failed to save packument" on the next one even
          # though the previous succeeded. We retry with backoff and skip
          # versions already on the registry so a partial-failure re-run
          # picks up where it left off.
          for pkg in linux-x64 linux-arm64 darwin-x64 darwin-arm64 win32-x64; do
            echo "::group::publish @hmanlab/$pkg"
            (
              cd "npm/@hmanlab/$pkg"
              pkg_name="@hmanlab/$pkg"
              pkg_version=$(node -p "require('./package.json').version")
              if npm view "${pkg_name}@${pkg_version}" version 2>/dev/null | grep -qx "${pkg_version}"; then
                echo "✓ ${pkg_name}@${pkg_version} already published, skipping"
                exit 0
              fi
              for attempt in 1 2 3; do
                if npm publish --access public --provenance; then
                  exit 0
                fi
                if [ "$attempt" -lt 3 ]; then
                  echo "attempt $attempt failed, retrying in 15s..."
                  sleep 15
                fi
              done
              echo "publish of ${pkg_name}@${pkg_version} failed after 3 attempts" >&2
              exit 1
            )
            echo "::endgroup::"
            # Small inter-publish delay reduces packument-race likelihood.
            sleep 3
          done

      - name: Publish umbrella
        # OIDC trusted publishing — see the subpackages step above.
        run: |
          cd npm/hmanlab
          pkg_version=$(node -p "require('./package.json').version")
          if npm view "hmanlab@${pkg_version}" version 2>/dev/null | grep -qx "${pkg_version}"; then
            echo "✓ hmanlab@${pkg_version} already published, skipping"
            exit 0
          fi
          for attempt in 1 2 3; do
            if npm publish --access public --provenance; then
              exit 0
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "attempt $attempt failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "publish of hmanlab@${pkg_version} failed after 3 attempts" >&2
          exit 1
